<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>counterculture price</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #pdf-container { 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); 
            background-color: #fff; 
            max-width: 900px; 
            width: 100%;
            overflow: auto;
            border-radius: 4px;
        }
        canvas { display: block; margin: 0 auto 10px; width: 100%; height: auto; }
        .controls { margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="controls">
        <span>Документ: <b>Инструкция.pdf</b></span>
    </div>

    <div id="pdf-container"></div>

    <script src="https://cloudflare.com"></script>

    <script>
        const url = 'https://gitub.com/xaynov-osint/7e8ea0bf_78fc_4dd5_994b_d16210e45013_Услуги_проекта_Контр_Культура.pdf';

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';

        const container = document.getElementById('pdf-container');

        pdfjsLib.getDocument(url).promise.then(pdf => {
            console.log('PDF загружен, страниц:', pdf.numPages);
            
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                renderPage(pdf, pageNum);
            }
        }).catch(err => {
            console.error('Ошибка загрузки:', err);
            container.innerHTML = '<p style="color:red">Ошибка загрузки файла. Проверьте путь или настройки CORS.</p>';
        });

        function renderPage(pdf, pageNum) {
            pdf.getPage(pageNum).then(page => {
                const scale = 1.5;
                const viewport = page.getViewport({ scale: scale });

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                container.appendChild(canvas);

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                page.render(renderContext);
            });
        }
    </script>
</body>
</html>
