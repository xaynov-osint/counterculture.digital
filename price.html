<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контр-Культура — Прайс-Лист</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
    <style>
        :root { --bg-color: #f3f4f6; }
        body { background-color: var(--bg-color); margin: 0; }
        
        .page-wrapper {
            position: relative;
            margin: 2rem auto;
            max-width: 900px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            background: white;
            line-height: 0; 
        }

        .textLayer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            line-height: 1.0;
            opacity: 1;
        }

        /* Делаем текст полностью прозрачным, чтобы его нельзя было выделить визуально, но можно было скопировать */
        .textLayer span {
            color: transparent !important;
            cursor: default;
        }

        /* Убираем фоновый цвет выделения */
        .textLayer ::selection {
            background: transparent;
        }
        
        .textLayer ::-moz-selection {
            background: transparent;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black mx-auto"></div>
            <p class="mt-4 text-gray-600">adapterofcounter.t.me -> counterculture.digital/price</p>
        </div>
    </div>

    <main id="main-content" class="pb-20"></main>

    <script>
        const url = 'https://raw.githubusercontent.com/xaynov-osint/counterculture.digital/main/7e8ea0bf_78fc_4dd5_994b_d16210e45013_Услуги_проекта_Контр_Культура.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        async function initWebPDF() {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const container = document.getElementById('main-content');

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    
                    const baseViewport = page.getViewport({ scale: 1.0 });
                    const containerWidth = 900;
                    const scale = containerWidth / baseViewport.width;
                    const viewport = page.getViewport({ scale: scale });

                    const section = document.createElement('section');
                    section.className = 'page-wrapper';
                    section.style.width = viewport.width + 'px';
                    section.style.height = viewport.height + 'px';
                    container.appendChild(section);

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    const outputScale = window.devicePixelRatio || 1;
                    
                    canvas.width = Math.floor(viewport.width * outputScale);
                    canvas.height = Math.floor(viewport.height * outputScale);
                    canvas.style.width = viewport.width + "px";
                    canvas.style.height = viewport.height + "px";

                    const renderContext = {
                        canvasContext: context,
                        viewport: page.getViewport({ scale: scale * outputScale }),
                    };
                    await page.render(renderContext).promise;
                    section.appendChild(canvas);

                    const textLayerDiv = document.createElement('div');
                    textLayerDiv.className = 'textLayer';
                    section.appendChild(textLayerDiv);

                    const textContent = await page.getTextContent();
                    
                    await pdfjsLib.renderTextLayer({
                        textContent: textContent,
                        container: textLayerDiv,
                        viewport: viewport,
                        enhanceTextSelection: true
                    }).promise;
                }
                
                document.getElementById('loading-screen').style.display = 'none';
            } catch (err) {
                console.error(err);
                document.body.innerHTML = '<div class="p-10 text-center">Ошибка. Проверьте CORS.</div>';
            }
        }

        window.onload = initWebPDF;
    </script>
</body>
</html>
